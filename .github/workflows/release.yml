name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/formation-api
  IMAGE_NAME_WEB: ${{ github.repository }}/formation-web

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ steps.sha.outputs.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:cache,mode=max

  build-and-push-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          target: runner
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ steps.sha.outputs.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:cache,mode=max
          build-args: |
            ${{ format('VITE_API_BASE_URL={0}', secrets.VITE_API_BASE_URL) || '' }}
            ${{ format('VITE_AUTH0_DOMAIN={0}', secrets.VITE_AUTH0_DOMAIN) || '' }}
            ${{ format('VITE_AUTH0_AUDIENCE={0}', secrets.VITE_AUTH0_AUDIENCE) || '' }}
            ${{ format('VITE_AUTH0_CLIENT_ID={0}', secrets.VITE_AUTH0_CLIENT_ID) || '' }}

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [build-and-push-api, build-and-push-web]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run coolify-deploy
        env:
          COOLIFY_ENDPOINT_URL: ${{ secrets.COOLIFY_ENDPOINT_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          MANIFEST_PATH: ./coolify.manifest.json
          COOLIFY_ENV_API: ${{ secrets.COOLIFY_ENV_API }}
          LOG_LEVEL: debug
        run: |
          if [ -z "$COOLIFY_ENDPOINT_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "Warning: COOLIFY_ENDPOINT_URL or COOLIFY_TOKEN not set, skipping deployment"
            exit 0
          fi
          echo $"Using COOLIFY_ENDPOINT_URL: $COOLIFY_ENDPOINT_URL"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Warning: Manifest file not found at $MANIFEST_PATH, skipping deployment"
            exit 0
          fi
          npx coolify-deploy --manifest "$MANIFEST_PATH" apply --tag "${{ steps.sha.outputs.sha }}"
