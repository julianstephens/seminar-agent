services:
  db:
    container_name: formation_db
    image: postgres:15
    environment:
      POSTGRES_USER: formation
      POSTGRES_PASSWORD: formation
      POSTGRES_DB: formation
    ports:
      - "5432:5432"
    volumes:
      - formation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formation"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: formation_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: backend.env
    environment:
      DATABASE_URL: postgres://formation:formation@db:5432/formation?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  web:
    container_name: formation_web
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file: web.env
    volumes:
      - ./web/src:/app/src
    depends_on:
      - api

volumes:
  formation_data:
